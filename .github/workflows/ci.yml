name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu-safe:
    name: CPU-safe checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install numpy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Validate benchmark artifact index
        env:
          PYTHONPATH: src
        run: |
          single-gpu-infer artifact-index --strict-warnings

      - name: Validate public doc links
        env:
          PYTHONPATH: src
        run: |
          single-gpu-infer doc-links

      - name: Verify checked-in artifact catalog
        env:
          PYTHONPATH: src
        run: |
          single-gpu-infer artifact-catalog --output /tmp/artifact-catalog.json > /dev/null
          cmp benchmarks/results/artifact-catalog.json /tmp/artifact-catalog.json

      - name: Run CPU-safe pytest suite
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q

      - name: Run static checks
        env:
          PYTHONPYCACHEPREFIX: /tmp/single-gpu-infer-pycache
        run: |
          ruff check --select E9,F63,F7,F82 src integrations scripts tests
          python -m compileall -q src integrations scripts tests
